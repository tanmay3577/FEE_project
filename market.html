<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Markets - Smart Utility Finance Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .asset-card {
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .asset-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .asset-price {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1rem 0;
            transition: color 0.3s;
            font-variant-numeric: tabular-nums;
        }
        .asset-change {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .up { color: var(--success); }
        .down { color: var(--danger); }
        
        /* Flash animation for updates */
        @keyframes flashUp { 0% { background-color: rgba(16, 185, 129, 0.2); } 100% { background-color: transparent; } }
        @keyframes flashDown { 0% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: transparent; } }
        
        .flash-up { animation: flashUp 1s ease-out; }
        .flash-down { animation: flashDown 1s ease-out; }

        /* Stock Ticker */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }
        .ticker-label {
            padding: 0 1rem;
            font-weight: 800;
            color: var(--accent-1);
            border-right: 2px solid var(--card-border);
            z-index: 2;
            background: var(--input-bg);
        }
        .ticker-inner {
            display: flex;
            white-space: nowrap;
            animation: ticker 25s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            padding: 0 2rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🚀 Smart Utility Finance Hub</a>
        <div class="nav-controls">
            <a href="index.html" class="nav-link">&larr; Back to Hub</a>
            <div id="global-clock" class="clock-widget">--:--:--</div>
            <button id="theme-toggle" class="btn">🌙 Dark Mode</button>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Live Markets (Simulated)</h1>
        <p class="page-subtitle">Track Gold, Silver, and Stocks in real-time.</p>

        <div class="market-grid" id="commodities-container">
            <!-- Commodities generated by JS -->
        </div>

        <div class="glass-panel" style="padding: 1.5rem; margin-top: 2rem;">
            <div class="ticker-wrap">
                <div class="ticker-label">STOCKS</div>
                <div class="ticker-inner" id="ticker-inner">
                    <!-- Ticker items generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="market.js"></script>
</body>
</html>
