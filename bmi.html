<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - Smart Utility Finance Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .bmi-gauge {
            height: 10px;
            width: 100%;
            background: linear-gradient(to right, #3b82f6 0%, #10b981 25%, #10b981 60%, #f59e0b 75%, #ef4444 100%);
            border-radius: 5px;
            margin-top: 2rem;
            position: relative;
        }
        .bmi-marker {
            position: absolute;
            top: -15px;
            width: 4px;
            height: 40px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: left 0.5s ease;
            left: 0%;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🚀 Smart Utility Finance Hub</a>
        <div class="nav-controls">
            <a href="index.html" class="nav-link">&larr; Back to Hub</a>
            <div id="global-clock" class="clock-widget">--:--:--</div>
            <button id="theme-toggle" class="btn">🌙 Dark Mode</button>
        </div>
    </nav>

    <main>
        <h1 class="page-title">BMI Calculator</h1>
        <p class="page-subtitle">Check your Body Mass Index and health category instantly.</p>

        <div class="tool-container glass-panel">
            <div class="form-group">
                <label class="form-label" for="weight">Weight (kg)</label>
                <input type="number" id="weight" class="form-control" placeholder="e.g. 70" min="20" max="300">
            </div>

            <div class="form-group">
                <label class="form-label" for="height">Height (cm)</label>
                <input type="number" id="height" class="form-control" placeholder="e.g. 175" min="50" max="300">
            </div>

            <button id="calc-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.2rem; margin-top: 1rem;">Calculate BMI</button>

            <div class="result-box" id="result-box" style="display: none;">
                <div style="font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-secondary);">Your BMI is</div>
                <div id="bmi-value" class="result-value">--</div>
                <div id="bmi-category" style="font-size: 1.5rem; font-weight: 600; margin-top: 0.5rem;">--</div>
                
                <div class="bmi-gauge">
                    <div id="bmi-marker" class="bmi-marker"></div>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 10px; color: var(--text-secondary);">
                    <span>Underweight</span>
                    <span>Normal</span>
                    <span>Overweight</span>
                    <span>Obese</span>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="bmi.js"></script>
</body>
</html>
