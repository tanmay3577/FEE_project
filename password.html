<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Smart Utility Finance Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        input[type="range"] { width: 100%; margin-top: 0.5rem; accent-color: var(--accent-1); }
        input[type="checkbox"] { width: 1.2rem; height: 1.2rem; accent-color: var(--accent-1); cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🚀 Smart Utility Finance Hub</a>
        <div class="nav-controls">
            <a href="index.html" class="nav-link">&larr; Back to Hub</a>
            <div id="global-clock" class="clock-widget">--:--:--</div>
            <button id="theme-toggle" class="btn">🌙 Dark Mode</button>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Secure Password Generator</h1>
        <p class="page-subtitle">Generate strong, random passwords to keep your accounts safe.</p>

        <div class="tool-container glass-panel">
            <div class="result-box" style="margin-top: 0; margin-bottom: 2rem; position: relative; padding-right: 4rem;">
                <div id="password-display" class="result-value" style="font-size: 1.5rem;">Click Generate</div>
                <button id="copy-btn" class="btn btn-primary" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); padding: 0.5rem;">Copy</button>
            </div>

            <div class="form-group">
                <div class="setting-row">
                    <label class="form-label" style="margin: 0;">Password Length</label>
                    <span id="length-val" style="font-weight: 800; color: var(--accent-1);">16</span>
                </div>
                <input type="range" id="length-slider" min="8" max="64" value="16">
            </div>

            <div class="form-group">
                <div class="setting-row">
                    <label class="form-label" style="margin: 0;" for="inc-upper">Include Uppercase (A-Z)</label>
                    <input type="checkbox" id="inc-upper" checked>
                </div>
                <div class="setting-row">
                    <label class="form-label" style="margin: 0;" for="inc-lower">Include Lowercase (a-z)</label>
                    <input type="checkbox" id="inc-lower" checked>
                </div>
                <div class="setting-row">
                    <label class="form-label" style="margin: 0;" for="inc-numbers">Include Numbers (0-9)</label>
                    <input type="checkbox" id="inc-numbers" checked>
                </div>
                <div class="setting-row">
                    <label class="form-label" style="margin: 0;" for="inc-symbols">Include Symbols (!@#$%)</label>
                    <input type="checkbox" id="inc-symbols" checked>
                </div>
            </div>

            <button id="generate-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.2rem; margin-top: 1rem;">Generate Password</button>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="password.js"></script>
</body>
</html>
