<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Smart Utility Finance Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🚀 Smart Utility Finance Hub</a>
        <div class="nav-controls">
            <a href="index.html" class="nav-link">&larr; Back to Hub</a>
            <div id="global-clock" class="clock-widget">--:--:--</div>
            <button id="theme-toggle" class="btn">🌙 Dark Mode</button>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Currency Converter</h1>
        <p class="page-subtitle">Real-time global exchange rates at your fingertips.</p>

        <div class="tool-container glass-panel">
            <div class="form-group">
                <label class="form-label" for="amount">Amount</label>
                <input type="number" id="amount" class="form-control" value="1" placeholder="Enter amount">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label" for="fromCurrency">From</label>
                    <select id="fromCurrency" class="form-control"></select>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: center; padding-top: 1.5rem; font-weight: 800; font-size: 1.2rem;">
                    ⇄
                </div>

                <div class="form-group" style="flex: 1;">
                    <label class="form-label" for="toCurrency">To</label>
                    <select id="toCurrency" class="form-control"></select>
                </div>
            </div>

            <div class="result-box">
                <div id="result-text" class="result-value">Enter Amount</div>
            </div>
        </div>

        <div class="glass-panel" style="margin-top: 3rem; overflow-x: auto;">
            <h2 style="margin-bottom: 1rem;">Live Market Rates (Relative to USD)</h2>
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--accent-1);">
                        <th style="padding: 1rem;">Country</th>
                        <th style="padding: 1rem;">Currency</th>
                        <th style="padding: 1rem;">Rate (USD)</th>
                        <th style="padding: 1rem;">Local Time</th>
                    </tr>
                </thead>
                <tbody id="rates-body"></tbody>
            </table>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="currency.js"></script>
</body>
</html>
